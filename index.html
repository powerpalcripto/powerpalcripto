<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerPal Miner PRO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        body { background: #0b0e11; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
        .card { background: #1e2329; padding: 25px; border-radius: 25px; border: 1px solid #f2e032; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        .balance { font-size: 38px; font-weight: 900; color: #ffffff; margin: 10px 0; font-family: monospace; }
        .euro { color: #0ecb81; font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        .mine-btn { width: 170px; height: 170px; border-radius: 50%; border: 8px solid #2b3139; background: #f2e032; color: #000; font-weight: 900; font-size: 20px; margin-top: 30px; cursor: pointer; transition: 0.2s; }
        .mine-btn:active { transform: scale(0.9); }
        .mine-btn:disabled { background: #2b3139; color: #5e6673; border-color: #1c2127; }
        .timer-box { margin-top: 20px; font-size: 14px; color: #8b949e; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
        .sell-btn { background: none; border: 1px solid #0ecb81; color: #0ecb81; padding: 8px 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <h2 style="color:#f2e032; letter-spacing: 2px;">POWERPAL MINER</h2>

    <div class="card">
        <div style="font-size: 12px; color: #8b949e;">MINED POWERPALL (PWP)</div>
        <div class="balance" id="balDisplay">0.000000</div>
        <div class="euro" id="eurDisplay">€0.00</div>
        <button class="sell-btn" onclick="requestTransfer()">SELL TO ADMIN (€6/PWP)</button>
    </div>

    <button class="mine-btn" id="mineBtn" onclick="start24hSession()">START MINING</button>

    <div class="timer-box">
        STATUS: <span id="statusTxt" style="color:#f2e032;">READY</span><br>
        TIME REMAINING: <span id="timeLeft">00:00:00</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // --- ТВОЯТА КОНФИГУРАЦИЯ (ПРОВЕРЕНА) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAs7zK6l6vDnd9pYIu-G2v_K6v_K6v_K6v", 
            databaseURL: "https://powerpall-default-rtdb.europe-west1.firebasedatabase.app"
        };
        
        // Инициализация
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        // Потребителски данни
        const user = tg.initDataUnsafe?.user || { id: "test_user", first_name: "Metodi" };
        const userId = user.id;

        let balance = 0;
        let sessionEnd = 0;
        const pwpPrice = 6;
        const ratePerSec = 1 / 3600; // 1 PWP на час
        let activeInterval;

        // 1. СЛЕДЕНЕ НА ДАННИТЕ ОТ FIREBASE
        db.ref('miners/' + userId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                balance = data.balance || 0;
                sessionEnd = data.sessionEnd || 0;
                updateDisplay();
                startInternalTimer();
            } else {
                // Създаване на нов потребител, ако го няма
                db.ref('miners/' + userId).set({
                    name: user.first_name,
                    balance: 0,
                    sessionEnd: 0
                });
            }
        });

        // 2. ФУНКЦИЯ ЗА ОБНОВЯВАНЕ НА ЕКРАНА
        function updateDisplay() {
            document.getElementById('balDisplay').innerText = balance.toFixed(6);
            document.getElementById('eurDisplay').innerText = "€" + (balance * pwpPrice).toFixed(2);
        }

        // 3. ЛОГИКА ЗА КОПАЕНЕ И ТАЙМЕР
        function startInternalTimer() {
            clearInterval(activeInterval);
            
            activeInterval = setInterval(() => {
                const now = Date.now();
                const btn = document.getElementById('mineBtn');

                if (sessionEnd > now) {
                    // Сесията е активна
                    btn.disabled = true;
                    btn.innerText = "MINING...";
                    document.getElementById('statusTxt').innerText = "ACTIVE";
                    
                    // Добавяме баланс визуално (на всяка секунда)
                    balance += ratePerSec;
                    updateDisplay();

                    // Смятаме оставащото време
                    let diff = sessionEnd - now;
                    let h = Math.floor(diff / 3600000);
                    let m = Math.floor((diff % 3600000) / 60000);
                    let s = Math.floor((diff % 60000) / 1000);
                    document.getElementById('timeLeft').innerText = 
                        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

                    // Записваме в базата на всеки 10 секунди за сигурност
                    if (s % 10 === 0) {
                        db.ref('miners/' + userId).update({ balance: balance });
                    }
                } else {
                    // Сесията е спряла
                    btn.disabled = false;
                    btn.innerText = "START MINING";
                    document.getElementById('statusTxt').innerText = "READY";
                    document.getElementById('timeLeft').innerText = "00:00:00";
                    clearInterval(activeInterval);
                }
            }, 1000);
        }

        // 4. СТАРТИРАНЕ НА НОВА СЕСИЯ
        function start24hSession() {
            const twentyFourHours = 24 * 60 * 60 * 1000;
            const newEnd = Date.now() + twentyFourHours;
            
            db.ref('miners/' + userId).update({
                sessionEnd: newEnd
            });
            
            tg.HapticFeedback.notificationOccurred('success');
        }

        // 5. ЗАЯВКА ЗА ПРОДАЖБА
        function requestTransfer() {
            if (balance <= 0) {
                alert("Нямате нищо за продаване!");
                return;
            }
            
            const amountToSell = balance;
            db.ref('transfer_requests/' + userId).push({
                name: user.first_name,
                pwp_amount: amountToSell,
                eur_value: (amountToSell * pwpPrice).toFixed(2),
                timestamp: Date.now()
            });

            // Нулираме баланса в миньора
            balance = 0;
            db.ref('miners/' + userId).update({ balance: 0 });
            
            alert("Заявката е изпратена! \nПродадохте " + amountToSell.toFixed(4) + " PWP за €" + (amountToSell * pwpPrice).toFixed(2));
            updateDisplay();
        }
    </script>
</body>
</html>
