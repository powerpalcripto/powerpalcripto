<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PowerPal High-Speed Miner</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; text-align: center; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { width: 80px; height: 80px; border-radius: 22px; margin-top: 10px; border: 2px solid #f2e032; box-shadow: 0 0 25px rgba(242, 224, 50, 0.3); }
        .brand { color: #f2e032; font-size: 12px; font-weight: 900; letter-spacing: 2px; margin-top: 12px; }
        
        .card { background: linear-gradient(145deg, #1e2329, #161a1e); padding: 25px; border-radius: 28px; border: 1px solid #f2e032; width: 90%; margin-top: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .balance { font-size: 36px; font-weight: 900; color: white; margin: 5px 0; font-family: 'Courier New', monospace; letter-spacing: -1px; }
        .euro-val { color: #0ecb81; font-weight: bold; font-size: 20px; margin-bottom: 10px; }
        
        .mine-btn { width: 170px; height: 170px; border-radius: 50%; border: 10px solid #2b3139; background: #f2e032; color: #0b0e11; font-size: 20px; font-weight: 900; margin-top: 30px; cursor: pointer; transition: 0.2s; outline: none; box-shadow: 0 0 30px rgba(242, 224, 50, 0.2); }
        .mine-btn:active { transform: scale(0.92); }
        .mine-btn:disabled { background: #2b3139; color: #5e6673; border-color: #1c2127; box-shadow: none; }

        .status-container { margin-top: 25px; width: 90%; display: flex; flex-direction: column; gap: 10px; }
        .stat-line { display: flex; justify-content: space-between; background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 15px; border: 1px solid #2b3139; font-size: 13px; }
        .timer-val { color: #f2e032; font-weight: bold; }
        
        .transfer-btn { background: none; border: 1px solid #0ecb81; color: #0ecb81; padding: 10px; border-radius: 12px; font-size: 11px; margin-top: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <img src="image.png" alt="PowerPal" class="logo">
    <div class="brand">POWERPAL ECO-MINER</div>

    <div class="card">
        <div style="color: #8b949e; font-size: 11px; text-transform: uppercase;">Mined Assets</div>
        <div class="balance" id="bal">0.000000</div>
        <div class="euro-val" id="eur">€0.00</div>
        <button class="transfer-btn" onclick="requestTransfer()">↑ TRANSFER TO MAIN ACCOUNT</button>
    </div>

    <button class="mine-btn" id="mBtn" onclick="startMiningSession()">START 24H</button>

    <div class="status-container">
        <div class="stat-line">
            <span>Mining Status:</span>
            <span id="status-text" style="color: #0ecb81;">READY</span>
        </div>
        <div class="stat-line">
            <span>Next Claim in:</span>
            <span class="timer-val" id="timerDisplay">--:--:--</span>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const firebaseConfig = {
            apiKey: "AIzaSyAs7zK6l6vDnd9pYIu-G2v_K6v_K6v_K6v", 
            databaseURL: "https://powerpall-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const user = tg.initDataUnsafe?.user || { id: "test_user", first_name: "Metodi" };
        const userId = user.id;

        let balance = 0;
        const ratePerSec = 1 / 3600; // 1 монета на 3600 секунди (1 час)
        const frameRate = ratePerSec / 10; // за 100ms
        let sessionEnd = 0;
        let mainInterval;

        db.ref('miners/' + userId).on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                balance = data.balance || 0;
                sessionEnd = data.sessionEnd || 0;
                updateVisuals();
                checkActiveSession();
            } else {
                db.ref('miners/' + userId).set({ name: user.first_name, balance: 0, sessionEnd: 0 });
            }
        });

        function updateVisuals() {
            document.getElementById('bal').innerText = balance.toFixed(6);
            document.getElementById('eur').innerText = "€" + (balance * 6).toFixed(2);
        }

        function checkActiveSession() {
            clearInterval(mainInterval);
            const now = Date.now();

            if (sessionEnd > now) {
                document.getElementById('mBtn').disabled = true;
                document.getElementById('status-text').innerText = "MINING ACTIVE";
                document.getElementById('status-text').style.color = "#0ecb81";

                mainInterval = setInterval(() => {
                    const timeLeft = sessionEnd - Date.now();
                    
                    if (timeLeft <= 0) {
                        clearInterval(mainInterval);
                        document.getElementById('mBtn').disabled = false;
                        document.getElementById('status-text').innerText = "SESSION ENDED";
                        document.getElementById('timerDisplay').innerText = "READY";
                    } else {
                        // Копаене в реално време (визуално на всеки 100ms)
                        balance += frameRate;
                        updateVisuals();

                        // Таймер
                        let h = Math.floor(timeLeft / 3600000);
                        let m = Math.floor((timeLeft % 3600000) / 60000);
                        let s = Math.floor((timeLeft % 60000) / 1000);
                        document.getElementById('timerDisplay').innerText = 
                            `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;

                        // Синхронизация с Firebase на всеки 10 секунди
                        if (Math.floor(Date.now()/1000) % 10 === 0) {
                            db.ref('miners/' + userId).update({ balance: balance });
                        }
                    }
                }, 100); // Обновява на всеки 100 милисекунди за ефект на "въртене"
            } else {
                document.getElementById('mBtn').disabled = false;
                document.getElementById('timerDisplay').innerText = "READY";
            }
        }

        function startMiningSession() {
            const twentyFourHours = 24 * 60 * 60 * 1000;
            sessionEnd = Date.now() + twentyFourHours;
            db.ref('miners/' + userId).update({ sessionEnd: sessionEnd });
            tg.HapticFeedback.notificationOccurred('success');
        }

        function requestTransfer() {
            if (balance <= 0) return;
            const amount = balance;
            db.ref('transfer_requests/' + userId).push({
                name: user.first_name,
                amount: amount,
                time: Date.now(),
                eur_value: amount * 6
            });
            balance = 0;
            db.ref('miners/' + userId).update({ balance: 0 });
            alert("Заявката е изпратена! \nОчаквайте прехвърляне на €" + (amount * 6).toFixed(2));
        }
    </script>
</body>
</html>
